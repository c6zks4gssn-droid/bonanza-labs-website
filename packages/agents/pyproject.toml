[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bonanza-agents"
version = "0.2.1"
description = "🤖 Bonanza Labs ✦ Agents — AI agent orchestration with built-in payments, video & search"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["ai", "agents", "orchestration", "payments", "video", "search"]
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.25",
    "pyyaml>=6.0",
    "click>=8.0",
    "rich>=13.0",
]

[project.scripts]
bonanza-agents = "bonanza_agents.cli:main"

[project.optional-dependencies]
api = ["fastapi>=0.104", "uvicorn>=0.24"]
dev = ["pytest>=7.0", "ruff>=0.1"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100