[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bonanza-approve"
version = "0.1.0"
description = "Human-in-the-loop approval gateway for AI agents — queue sensitive actions, notify humans, collect decisions"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["ai", "agent", "approval", "human-in-the-loop", "hitl", "gateway", "review"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["pydantic>=2.0", "httpx>=0.24"]

[project.optional-dependencies]
stripe = ["stripe>=5.0"]
telegram = ["python-telegram-bot>=20.0"]
slack = ["slack-sdk>=3.0"]
all = ["stripe>=5.0", "python-telegram-bot>=20.0", "slack-sdk>=3.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21"]

[project.urls]
Homepage = "https://bonanza-labs.com"
Repository = "https://github.com/c6zks4gssn-droid/bonanza-labs-website"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100