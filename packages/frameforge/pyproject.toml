[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bonanza-labs-frameforge"
version = "0.2.0"
description = "🎬 FrameForge — AI Video Generator. Script → Voice → Video. Manim + Edge-TTS + Voicebox."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["ai", "video", "manim", "tts", "voiceover", "bonanza", "frameforge"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "click>=8.0",
    "edge-tts>=6.1",
    "rich>=13.0",
    "requests>=2.28",
]

[project.optional-dependencies]
manim = ["manim>=0.18"]
voicebox = ["requests>=2.28"]

[project.scripts]
frameforge = "frameforge.__init__:main"

[project.urls]
Homepage = "https://bonanza-labs.tiiny.site"
Repository = "https://github.com/c6zks4gssn-droid/bonanza-labs-frameforge"

[tool.hatch.build.targets.wheel]
packages = ["src/frameforge"]
