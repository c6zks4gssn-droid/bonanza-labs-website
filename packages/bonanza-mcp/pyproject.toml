[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bonanza-mcp"
version = "0.1.0"
description = "MCP server for AI agent payments — spending firewall, budget checks, and approval flows via the Model Context Protocol"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["mcp", "ai", "agent", "payment", "firewall", "spending", "budget", "approval", "x402", "stripe"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0",
    "httpx>=0.24",
]

[project.optional-dependencies]
x402 = ["x402>=2.0", "bonanza-x402>=0.1.0"]
stripe = ["stripe>=5.0"]
all = ["x402>=2.0", "bonanza-x402>=0.1.0", "stripe>=5.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "ruff>=0.1"]

[project.scripts]
bonanza-mcp = "bonanza_mcp.server:main"

[project.urls]
Homepage = "https://bonanza-labs.com"
Documentation = "https://github.com/c6zks4gssn-droid/bonanza-labs-website/tree/main/packages/bonanza-mcp"
Repository = "https://github.com/c6zks4gssn-droid/bonanza-labs-website"
Issues = "https://github.com/c6zks4gssn-droid/bonanza-labs-website/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"