[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bonanza-guard"
version = "0.1.0"
description = "Security guardrails for AI agents — input filtering, prompt injection detection, and output validation"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["ai", "agent", "security", "guardrails", "safety", "prompt-injection", "content-filter"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["pydantic>=2.0"]

[project.urls]
Homepage = "https://bonanza-labs.com"
Repository = "https://github.com/c6zks4gssn-droid/bonanza-labs-website"

[tool.setuptools.packages.find]
where = ["src"]