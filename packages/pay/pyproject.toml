[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bonanza-labs-pay"
version = "0.1.1"
description = "💳 Bonanza Labs Pay — Stripe + Stablecoin payment framework"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["stripe", "stablecoin", "usdc", "payments", "crypto", "subscriptions"]
dependencies = [
    "stripe>=9.0",
    "pydantic>=2.0",
    "httpx>=0.25",
    "pyyaml>=6.0",
]

[project.scripts]
bonanza-pay = "bonanza_pay.cli:main"

[project.optional-dependencies]
api = ["fastapi>=0.104", "uvicorn>=0.24"]
solana = ["solana>=0.30", "solders>=0.14"]
dev = ["pytest>=7.0", "ruff>=0.1"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"