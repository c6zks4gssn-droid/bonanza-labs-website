[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bonanza-x402"
version = "0.1.0"
description = "Spending firewall meets the HTTP 402 payment protocol. Policy-based spending controls for AI agent payments."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Bonanza Labs", email = "passiveassets@proton.me"}]
keywords = ["x402", "payment", "ai", "agent", "firewall", "spending", "stripe", "crypto", "usdc", "budget", "approval"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.24",
]

[project.optional-dependencies]
x402 = ["x402>=2.0"]
stripe = ["stripe>=5.0"]
solana = ["solana>=0.30", "solders>=0.18"]
all = ["x402>=2.0", "stripe>=5.0", "solana>=0.30", "solders>=0.18"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "ruff>=0.1"]

[project.urls]
Homepage = "https://bonanza-labs.com"
Documentation = "https://github.com/c6zks4gssn-droid/bonanza-labs-website/tree/main/packages/x402-adapter"
Repository = "https://github.com/c6zks4gssn-droid/bonanza-labs-website"
Issues = "https://github.com/c6zks4gssn-droid/bonanza-labs-website/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
